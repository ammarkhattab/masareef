<svg xmlns="http://www.w3.org/2000/svg" width="960" height="420" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Masareef terminal demo preview</title>
  <desc id="desc">A static terminal-style preview of Masareef commands and output.</desc>
  <rect width="960" height="420" fill="#111827"/>
  <rect x="32" y="28" width="896" height="364" rx="8" fill="#0b1220" stroke="#334155"/>
  <circle cx="62" cy="56" r="7" fill="#ef4444"/>
  <circle cx="86" cy="56" r="7" fill="#f59e0b"/>
  <circle cx="110" cy="56" r="7" fill="#22c55e"/>
  <text x="54" y="104" font-family="Consolas, monospace" font-size="22" fill="#93c5fd">$ masareef add 450 food "dinner" --date 2026-06-30</text>
  <text x="54" y="146" font-family="Consolas, monospace" font-size="22" fill="#bbf7d0">Logged #1: EGP 450.00 ($9.00) - food - 2026-06-30</text>
  <text x="54" y="204" font-family="Consolas, monospace" font-size="22" fill="#93c5fd">$ masareef status</text>
  <text x="54" y="246" font-family="Consolas, monospace" font-size="22" fill="#f8fafc">Spent:      $10.70 / EGP 535.00</text>
  <text x="54" y="284" font-family="Consolas, monospace" font-size="22" fill="#f8fafc">Budget:     $800.00 / ~EGP 40,000.00</text>
  <text x="54" y="322" font-family="Consolas, monospace" font-size="22" fill="#f8fafc">Used:       1.3%</text>
  <text x="54" y="360" font-family="Consolas, monospace" font-size="22" fill="#f8fafc">Top:        food $9.00, transport $1.70</text>
</svg>
